<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Página no encontrada | Tu Indemnización Laboral</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0f2a43;--navy-d:#081a2c;--navy-l:#e8eef3;--gold:#c9932c;--gold-d:#a97a1f;--white:#fff;--gray-4:#5b6b78;--text:#182430}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--text);font-size:16px;line-height:1.7}
a{color:var(--navy);text-decoration:none}
h1,h2{font-family:'Playfair Display',serif;color:var(--navy-d)}
.nav{position:sticky;top:0;z-index:100;background:var(--navy-d);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:64px}
.nav .logo{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--white);letter-spacing:-0.5px;white-space:nowrap;text-decoration:none}
.nav .logo span{color:var(--gold)}
.nav-links{display:flex;gap:1.25rem;list-style:none}
.nav-links a{color:#c3cdd6;text-decoration:none;font-size:0.85rem}
@media(max-width:700px){.nav-links{display:none}}
.wrap{max-width:600px;margin:0 auto;padding:5rem 1.5rem;text-align:center}
.code{font-family:'Playfair Display',serif;font-size:4rem;color:var(--gold-d);line-height:1}
.wrap h1{font-size:1.6rem;margin:0.75rem 0 0.6rem}
.wrap p{color:var(--gray-4);margin-bottom:2rem}
.links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-primary{background:var(--gold);color:var(--navy-d);padding:0.8rem 1.5rem;border-radius:8px;font-weight:700;font-size:0.9rem}
.btn-secondary{background:var(--navy-l);color:var(--navy-d);padding:0.8rem 1.5rem;border-radius:8px;font-weight:600;font-size:0.9rem}
footer{background:var(--navy-d);color:#a9b6c0;padding:2rem 1.5rem;text-align:center;font-size:0.8rem}
footer a{color:#a9b6c0}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="logo">Tu Indemnización<span> Laboral</span></a>
  <ul class="nav-links">
    <li><a href="/servicios/">Servicios</a></li>
    <li><a href="/contacto/">Contacto</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="code">404</div>
  <h1>Esta página no existe</h1>
  <p>Puede que el enlace esté roto o que la página se haya movido. Prueba a ir al inicio o cuéntanos tu caso directamente.</p>
  <div class="links">
    <a href="/" class="btn-primary">Ir al inicio →</a>
    <a href="/contacto/" class="btn-secondary">Consulta gratuita</a>
  </div>
</div>

<footer>
  © 2026 Tu Indemnización Laboral · <a href="/aviso-legal/">Aviso legal</a> · <a href="/privacidad/">Privacidad</a>
</footer>

</body>
</html>
